name: Deploy Stock Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-west-1
  S3_BUCKET: stock-pipeline-frontend-553853450914
  CLOUDFRONT_DISTRIBUTION_ID: E6KVNY0GMGB6N
  LAMBDA_FUNCTION_INGEST: stock-ingest
  LAMBDA_FUNCTION_API: stock-api

jobs:
  # ── Job 1: Deploy Backend Lambda ─────────────────────────────
  deploy-backend:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Python dependencies into package
        run: |
          pip install \
            requests \
            boto3 \
            python-dotenv \
            --target backend/ingestion \
            --quiet

      - name: Zip Lambda package
        run: |
          cd backend/ingestion
          zip -r ../../lambda_deploy.zip . \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude "*.dist-info/*" \
            --exclude "backfill_enrichment.py" \
            --exclude "test_massive.py" \
            --exclude "configure_ingest_cron.py" \
            --exclude "fetch_past_days.py"

      - name: Deploy stock-ingest Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_INGEST }} \
            --zip-file fileb://lambda_deploy.zip \
            --region ${{ env.AWS_REGION }} > /dev/null

      - name: Deploy stock-api Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_API }} \
            --zip-file fileb://lambda_deploy.zip \
            --region ${{ env.AWS_REGION }} > /dev/null


  # ── Job 2: Deploy Frontend ────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist s3://${{ env.S3_BUCKET }} \
            --delete \
            --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
